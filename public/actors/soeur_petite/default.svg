<svg viewBox="0 0 160 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dress: mint teal -->
    <radialGradient id="sp-dress" cx="48%" cy="22%" r="68%">
      <stop offset="0%" stop-color="#7fd1b9"/>
      <stop offset="45%" stop-color="#4aaa90"/>
      <stop offset="100%" stop-color="#2a7060"/>
    </radialGradient>
    <!-- Bodice -->
    <linearGradient id="sp-bodice" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a8070"/>
      <stop offset="40%" stop-color="#4db8a0"/>
      <stop offset="100%" stop-color="#2a8070"/>
    </linearGradient>
    <!-- Skin: rosy fair -->
    <radialGradient id="sp-skin" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#fae6cc"/>
      <stop offset="100%" stop-color="#e8c098"/>
    </radialGradient>
    <!-- Hair: light brown -->
    <radialGradient id="sp-hair" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#9a7040"/>
      <stop offset="100%" stop-color="#5a3a18"/>
    </radialGradient>
  </defs>

  <!-- Floor shadow -->
  <ellipse cx="80" cy="298" rx="30" ry="4" fill="rgba(0,0,0,0.28)"/>

  <!-- ── Legs (shorter, rounder) ── -->
  <rect x="56" y="245" width="18" height="50" rx="7" fill="#2a7060"/>
  <rect x="86" y="245" width="18" height="50" rx="7" fill="#2a7060"/>
  <!-- Slipper/shoe detail -->
  <ellipse cx="65" cy="294" rx="12" ry="5" fill="#1a5048"/>
  <ellipse cx="95" cy="294" rx="12" ry="5" fill="#1a5048"/>
  <!-- Shoe bow -->
  <path d="M 61 291 Q 65 287 69 291" fill="none" stroke="#7fd1b9" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 91 291 Q 95 287 99 291" fill="none" stroke="#7fd1b9" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── Skirt (shorter than grande, more ruffles) ── -->
  <!-- Under-skirt -->
  <path d="M 44 158 Q 16 208 14 300 L 146 300 Q 144 208 116 158 Z" fill="#1e6858"/>
  <!-- Main skirt -->
  <path d="M 48 158 Q 20 208 18 298 L 142 298 Q 140 208 112 158 Z" fill="url(#sp-dress)"/>
  <!-- Many ruffled layers (more than grande) -->
  <!-- Ruffle 1 (highest) -->
  <path d="M 26 210 Q 80 198 134 210 L 135 224 Q 80 210 25 224 Z" fill="#3aa090" opacity="0.7"/>
  <!-- Ruffle 2 -->
  <path d="M 20 230 Q 80 218 140 230 L 141 244 Q 80 230 19 244 Z" fill="#3aa090" opacity="0.75"/>
  <!-- Ruffle 3 -->
  <path d="M 16 248 Q 80 236 144 248 L 144 262 Q 80 248 16 262 Z" fill="#3aa090" opacity="0.7"/>
  <!-- Ruffle bottom (widest) -->
  <path d="M 14 266 Q 80 254 146 266 L 146 282 Q 80 268 14 282 Z" fill="#2a8070"/>
  <!-- White/cream trim on each ruffle (excessively cute) -->
  <path d="M 25 224 Q 80 210 135 224" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <path d="M 19 244 Q 80 230 141 244" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <path d="M 16 262 Q 80 248 144 262" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Skirt center highlight -->
  <path d="M 74 158 Q 70 208 72 298 L 88 298 Q 90 208 86 158 Z" fill="rgba(255,255,255,0.05)"/>

  <!-- ── Bodice ── -->
  <path d="M 46 118 L 44 158 L 116 158 L 114 118 Q 80 107 46 118 Z" fill="url(#sp-bodice)"/>
  <!-- Center seam -->
  <line x1="80" y1="107" x2="80" y2="158" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <!-- Cute bow at waist center -->
  <path d="M 68 148 Q 72 142 80 145 Q 88 142 92 148 Q 88 154 80 151 Q 72 154 68 148 Z" fill="#5ad4b8" opacity="0.65"/>
  <!-- Bow knot center -->
  <ellipse cx="80" cy="149" rx="4" ry="3" fill="#7fd1b9"/>
  <!-- Square neckline (primly overdressed) -->
  <rect x="62" y="107" width="36" height="12" rx="0" fill="url(#sp-bodice)" opacity="0.6"/>
  <path d="M 62 107 L 98 107 L 98 119 L 62 119 Z" fill="none" stroke="#4db8a0" stroke-width="2"/>
  <!-- Lace at neckline -->
  <path d="M 62 107 Q 70 102 80 104 Q 90 102 98 107" fill="none" stroke="rgba(200,240,230,0.45)" stroke-width="2.5" stroke-dasharray="3,4"/>

  <!-- ── Shoulders (round, padded) ── -->
  <ellipse cx="46" cy="118" rx="15" ry="8" fill="#c8e8dc"/>
  <ellipse cx="114" cy="118" rx="15" ry="8" fill="#b8d8cc"/>
  <!-- Puffed shoulder detail -->
  <ellipse cx="40" cy="120" rx="12" ry="9" fill="#a0d8c0"/>
  <ellipse cx="120" cy="120" rx="12" ry="9" fill="#98c8b4"/>

  <!-- ── Left arm (hanging, slightly akimbo — pouty posture) ── -->
  <path d="M 40 118 Q 24 140 26 172 Q 28 178 36 176 Q 32 146 46 124 Z" fill="#c8e0d4"/>
  <!-- Left hand -->
  <path d="M 26 172 Q 22 186 28 193 Q 36 196 38 186 Q 34 176 36 172 Z" fill="url(#sp-skin)"/>

  <!-- ── Right arm (slightly raised, self-important little gesture) ── -->
  <path d="M 120 118 Q 134 138 132 168 Q 130 174 122 172 Q 126 144 114 124 Z" fill="#b8d0c4"/>
  <!-- Right hand, slightly raised -->
  <path d="M 132 168 Q 136 180 130 186 Q 122 188 120 180 Q 124 172 124 168 Z" fill="url(#sp-skin)"/>

  <!-- ── Neck (short, round) ── -->
  <rect x="73" y="97" width="14" height="20" rx="5" fill="url(#sp-skin)"/>

  <!-- ── Hair (back, with big bow) ── -->
  <ellipse cx="80" cy="60" rx="30" ry="30" fill="#3e2410"/>
  <!-- Side curls -->
  <ellipse cx="52" cy="65" rx="12" ry="18" fill="#4a2c14"/>
  <ellipse cx="108" cy="65" rx="12" ry="18" fill="#4a2c14"/>

  <!-- ── Head (rounder, younger) ── -->
  <ellipse cx="80" cy="57" rx="26" ry="28" fill="url(#sp-skin)"/>
  <!-- Soft round jaw -->
  <path d="M 56 68 Q 68 90 80 91 Q 92 90 104 68" fill="url(#sp-skin)"/>
  <!-- Full rosy cheeks -->
  <ellipse cx="62" cy="68" rx="10" ry="7" fill="rgba(230,120,100,0.14)"/>
  <ellipse cx="98" cy="68" rx="10" ry="7" fill="rgba(230,120,100,0.14)"/>
  <!-- Bright rosy blush (she's vain and a bit flushed) -->
  <ellipse cx="64" cy="66" rx="7" ry="4.5" fill="rgba(230,100,90,0.18)"/>
  <ellipse cx="96" cy="66" rx="7" ry="4.5" fill="rgba(230,100,90,0.18)"/>

  <!-- ── Hair front ── -->
  <!-- Left temple curl -->
  <path d="M 56 44 Q 46 56 48 70 Q 52 78 60 72 Q 50 60 58 50 Z" fill="#5a3418"/>
  <!-- Right temple curl -->
  <path d="M 104 44 Q 114 56 112 70 Q 108 78 100 72 Q 110 60 102 50 Z" fill="#5a3418"/>
  <!-- Top hair (slightly messy, with center part) -->
  <path d="M 58 44 Q 68 34 80 32 Q 92 34 102 44 Q 92 38 80 36 Q 68 38 58 44 Z" fill="url(#sp-hair)"/>
  <!-- Hair texture -->
  <path d="M 66 36 Q 72 32 80 32" fill="none" stroke="#3a2010" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 80 32 Q 88 32 94 36" fill="none" stroke="#3a2010" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ── LARGE BOW in hair (signature accessory) ── -->
  <!-- Left wing of bow -->
  <path d="M 62 36 Q 50 24 52 14 Q 60 10 68 22 Q 66 30 62 36 Z" fill="#5ad4b8"/>
  <path d="M 62 36 Q 52 28 54 16 Q 60 12 68 22 Q 66 30 62 36 Z" fill="#7fd1b9" opacity="0.8"/>
  <!-- Right wing of bow -->
  <path d="M 98 36 Q 110 24 108 14 Q 100 10 92 22 Q 94 30 98 36 Z" fill="#5ad4b8"/>
  <path d="M 98 36 Q 108 28 106 16 Q 100 12 92 22 Q 94 30 98 36 Z" fill="#7fd1b9" opacity="0.8"/>
  <!-- Bow center knot -->
  <ellipse cx="80" cy="36" rx="8" ry="5" fill="#4db8a0"/>
  <ellipse cx="80" cy="36" rx="5" ry="3" fill="#6ad0b8"/>
  <!-- Bow tail left -->
  <path d="M 72 38 Q 64 46 60 54 Q 64 56 68 50 Q 70 44 74 40 Z" fill="#5ad4b8" opacity="0.7"/>
  <!-- Bow tail right -->
  <path d="M 88 38 Q 96 46 100 54 Q 96 56 92 50 Q 90 44 86 40 Z" fill="#5ad4b8" opacity="0.7"/>

  <!-- ── Eyes (wide, vain, with heavy lashes) ── -->
  <!-- Left eye (bigger, rounder) -->
  <ellipse cx="68" cy="52" rx="9" ry="6.5" fill="white"/>
  <ellipse cx="68" cy="53" rx="5.2" ry="5" fill="#3a6890"/>
  <ellipse cx="68" cy="53" rx="3.2" ry="3.2" fill="#101828"/>
  <ellipse cx="70" cy="51" rx="1.6" ry="1.4" fill="rgba(255,255,255,0.72)"/>
  <!-- Upper lashes (cute flutter) -->
  <path d="M 59 49 Q 68 44 77 49" fill="none" stroke="#1a0a04" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="61" y1="48" x2="59" y2="43" stroke="#1a0a04" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="65" y1="46" x2="64" y2="41" stroke="#1a0a04" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="68" y1="45" x2="68" y2="40" stroke="#1a0a04" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="72" y1="46" x2="73" y2="41" stroke="#1a0a04" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="75" y1="48" x2="77" y2="44" stroke="#1a0a04" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Eyebrow (thin, high arched — vain) -->
  <path d="M 59 44 Q 68 39 77 42" fill="none" stroke="#6a4020" stroke-width="2" stroke-linecap="round"/>

  <!-- Right eye -->
  <ellipse cx="92" cy="52" rx="9" ry="6.5" fill="white"/>
  <ellipse cx="92" cy="53" rx="5.2" ry="5" fill="#3a6890"/>
  <ellipse cx="92" cy="53" rx="3.2" ry="3.2" fill="#101828"/>
  <ellipse cx="94" cy="51" rx="1.6" ry="1.4" fill="rgba(255,255,255,0.72)"/>
  <path d="M 83 49 Q 92 44 101 49" fill="none" stroke="#1a0a04" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="85" y1="48" x2="83" y2="43" stroke="#1a0a04" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="89" y1="46" x2="88" y2="41" stroke="#1a0a04" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="92" y1="45" x2="92" y2="40" stroke="#1a0a04" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="96" y1="46" x2="97" y2="41" stroke="#1a0a04" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="99" y1="48" x2="101" y2="44" stroke="#1a0a04" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 83 44 Q 92 39 101 42" fill="none" stroke="#6a4020" stroke-width="2" stroke-linecap="round"/>

  <!-- ── Nose (button nose — younger) ── -->
  <ellipse cx="80" cy="65" rx="3" ry="2.5" fill="rgba(180,100,70,0.1)"/>
  <ellipse cx="77" cy="65" rx="2" ry="1.5" fill="rgba(160,80,60,0.12)"/>
  <ellipse cx="83" cy="65" rx="2" ry="1.5" fill="rgba(160,80,60,0.12)"/>

  <!-- ── Mouth (pouty, full lips — self-important) ── -->
  <!-- Upper lip with pout -->
  <path d="M 70 73 Q 75 70 80 72 Q 85 70 90 73 Q 85 76 80 74 Q 75 76 70 73 Z" fill="#d08880"/>
  <!-- Lower lip (plump pout) -->
  <path d="M 70 73 Q 80 80 90 73 Q 85 76 80 74 Q 75 76 70 73 Z" fill="#e09898"/>
  <path d="M 70 73 Q 80 71 90 73" fill="none" stroke="#b06868" stroke-width="1"/>
  <!-- Lip highlight (self-admiring shine) -->
  <ellipse cx="80" cy="76" rx="5" ry="2" fill="rgba(255,200,190,0.35)"/>

  <!-- Small pearl earrings -->
  <circle cx="53" cy="68" r="3.5" fill="#f8f2ea" stroke="#d8c8b0" stroke-width="0.6"/>
  <ellipse cx="52.5" cy="67" rx="1.4" ry="1.1" fill="rgba(255,255,255,0.6)"/>
  <circle cx="107" cy="68" r="3.5" fill="#f8f2ea" stroke="#d8c8b0" stroke-width="0.6"/>
  <ellipse cx="106.5" cy="67" rx="1.4" ry="1.1" fill="rgba(255,255,255,0.6)"/>
</svg>
