<svg viewBox="0 0 160 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="roi-skin" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#f5d4a8"/>
      <stop offset="100%" stop-color="#d8a870"/>
    </radialGradient>
    <linearGradient id="roi-coat" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#1c2d7a"/>
      <stop offset="100%" stop-color="#101d55"/>
    </linearGradient>
    <linearGradient id="roi-legs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14215e"/>
      <stop offset="100%" stop-color="#0c1640"/>
    </linearGradient>
    <radialGradient id="roi-hair" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#9a8a7a"/>
      <stop offset="100%" stop-color="#4a3e36"/>
    </radialGradient>
    <linearGradient id="roi-crown" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#a07820"/>
      <stop offset="50%" stop-color="#e4b830"/>
      <stop offset="100%" stop-color="#f8d860"/>
    </linearGradient>
    <linearGradient id="roi-ermine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2ece4"/>
      <stop offset="100%" stop-color="#d8d0c4"/>
    </linearGradient>
    <linearGradient id="roi-scepter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a832"/>
      <stop offset="100%" stop-color="#7a5c10"/>
    </linearGradient>
  </defs>

  <!-- Floor shadow -->
  <ellipse cx="80" cy="298" rx="36" ry="4.5" fill="rgba(0,0,0,0.32)"/>

  <!-- ── Boots / legs ── -->
  <rect x="50" y="230" width="24" height="58" rx="9" fill="url(#roi-legs)"/>
  <rect x="86" y="230" width="24" height="58" rx="9" fill="url(#roi-legs)"/>
  <!-- Boot cuffs (turned-down) -->
  <rect x="50" y="268" width="24" height="20" rx="7" fill="#0c1638"/>
  <rect x="86" y="268" width="24" height="20" rx="7" fill="#0c1638"/>
  <!-- Boot gold trim -->
  <rect x="50" y="268" width="24" height="3.5" rx="1.5" fill="#c8981e" opacity="0.75"/>
  <rect x="86" y="268" width="24" height="3.5" rx="1.5" fill="#c8981e" opacity="0.75"/>

  <!-- ── Lower royal robe ── -->
  <path d="M 44 182 L 116 182 L 118 230 L 42 230 Z" fill="#12195a"/>
  <!-- Center front panel -->
  <rect x="68" y="182" width="24" height="48" rx="2" fill="rgba(255,255,255,0.04)"/>
  <!-- Robe gold hem -->
  <path d="M 42 230 L 118 230" stroke="#c8981e" stroke-width="2" opacity="0.55"/>
  <!-- Buttons down center -->
  <circle cx="80" cy="195" r="2.8" fill="#c8981e" opacity="0.65"/>
  <circle cx="80" cy="210" r="2.8" fill="#c8981e" opacity="0.65"/>
  <circle cx="80" cy="225" r="2.8" fill="#c8981e" opacity="0.65"/>

  <!-- ── Coat body ── -->
  <path d="M 36 108 Q 26 138 30 182 L 130 182 Q 134 138 124 108 Z" fill="url(#roi-coat)"/>
  <!-- Coat gold vertical trim (left of center, right of center) -->
  <path d="M 65 108 L 64 182 M 96 108 L 95 182" stroke="#c8981e" stroke-width="1.5" opacity="0.22"/>

  <!-- ── Left arm (with scepter) ── -->
  <rect x="26" y="114" width="19" height="62" rx="8" fill="#1c2d7a"/>
  <!-- Scepter shaft -->
  <rect x="18" y="76" width="6" height="90" rx="3" fill="url(#roi-scepter)"/>
  <!-- Scepter top orb -->
  <circle cx="21" cy="74" r="11" fill="#c89820"/>
  <circle cx="21" cy="74" r="8" fill="#e4b430"/>
  <!-- Cross atop orb -->
  <rect x="19" y="62" width="4" height="12" rx="2" fill="#a07018"/>
  <rect x="14" y="68" width="14" height="4" rx="2" fill="#a07018"/>
  <circle cx="21" cy="62" r="4.5" fill="#8a2222"/>
  <ellipse cx="20" cy="61" rx="2" ry="1.5" fill="rgba(255,180,160,0.45)"/>
  <!-- Left gloved hand at scepter -->
  <path d="M 28 170 Q 22 185 26 194 Q 34 198 38 189 Q 34 178 34 172 Z" fill="#e8dcc8"/>

  <!-- ── Right arm ── -->
  <rect x="115" y="114" width="19" height="55" rx="8" fill="#1c2d7a"/>
  <!-- Right hand (slight gesture) -->
  <path d="M 118 163 Q 120 178 116 185 Q 108 188 106 179 Q 110 170 112 164 Z" fill="#e8dcc8"/>

  <!-- ── Epaulettes ── -->
  <!-- Left -->
  <ellipse cx="36" cy="112" rx="16" ry="8" fill="#c8981e" opacity="0.85"/>
  <rect x="26" y="107" width="20" height="7" rx="3.5" fill="#d4a828"/>
  <line x1="28" y1="112" x2="44" y2="112" stroke="#a07018" stroke-width="1" opacity="0.5"/>
  <!-- Right -->
  <ellipse cx="124" cy="112" rx="16" ry="8" fill="#c8981e" opacity="0.85"/>
  <rect x="114" y="107" width="20" height="7" rx="3.5" fill="#d4a828"/>
  <line x1="116" y1="112" x2="132" y2="112" stroke="#a07018" stroke-width="1" opacity="0.5"/>

  <!-- ── Ermine collar ── -->
  <path d="M 36 108 Q 58 92 80 90 Q 102 92 124 108 Q 102 118 80 116 Q 58 118 36 108 Z" fill="url(#roi-ermine)"/>
  <!-- Ermine black spots -->
  <ellipse cx="52" cy="109" rx="2.8" ry="2" fill="#222" opacity="0.45"/>
  <ellipse cx="66" cy="112" rx="2.8" ry="2" fill="#222" opacity="0.45"/>
  <ellipse cx="94" cy="112" rx="2.8" ry="2" fill="#222" opacity="0.45"/>
  <ellipse cx="108" cy="109" rx="2.8" ry="2" fill="#222" opacity="0.45"/>

  <!-- ── White jabot / cravat ── -->
  <path d="M 70 97 Q 80 102 90 97 Q 86 115 80 122 Q 74 115 70 97 Z" fill="#f0ece6"/>
  <path d="M 73 100 Q 78 112 76 120" stroke="#d8d0c4" stroke-width="1.5" fill="none"/>
  <path d="M 87 100 Q 82 112 84 120" stroke="#d8d0c4" stroke-width="1.5" fill="none"/>

  <!-- ── Neck ── -->
  <rect x="73" y="72" width="14" height="18" rx="5" fill="url(#roi-skin)"/>

  <!-- ── Hair (back, behind head) ── -->
  <ellipse cx="80" cy="54" rx="30" ry="32" fill="#3a3028"/>
  <!-- Side hair volumes -->
  <ellipse cx="54" cy="58" rx="10" ry="16" fill="#4a4034"/>
  <ellipse cx="106" cy="58" rx="10" ry="16" fill="#4a4034"/>

  <!-- ── Head ── -->
  <ellipse cx="80" cy="52" rx="25" ry="27" fill="url(#roi-skin)"/>
  <!-- Jaw -->
  <path d="M 57 62 Q 68 82 80 84 Q 92 82 103 62" fill="url(#roi-skin)"/>
  <!-- Cheek shadow -->
  <ellipse cx="62" cy="64" rx="9" ry="6" fill="rgba(160,90,50,0.08)"/>
  <ellipse cx="98" cy="64" rx="9" ry="6" fill="rgba(160,90,50,0.08)"/>

  <!-- ── Hair front layer ── -->
  <!-- Left temple sweep -->
  <path d="M 56 40 Q 48 52 50 68 Q 54 76 60 70 Q 52 58 58 46 Z" fill="#504438"/>
  <!-- Right temple sweep -->
  <path d="M 104 40 Q 112 52 110 68 Q 106 76 100 70 Q 108 58 102 46 Z" fill="#504438"/>
  <!-- Main hair mass on top (salt&pepper) -->
  <ellipse cx="80" cy="32" rx="22" ry="16" fill="url(#roi-hair)"/>
  <!-- Silver streak highlights -->
  <path d="M 70 24 Q 76 20 82 24" fill="none" stroke="rgba(200,195,185,0.4)" stroke-width="2.5"/>
  <path d="M 76 22 Q 80 19 84 22" fill="none" stroke="rgba(200,195,185,0.55)" stroke-width="1.5"/>

  <!-- ── Eyes ── -->
  <!-- Left eye -->
  <ellipse cx="68" cy="50" rx="8.5" ry="5.5" fill="white"/>
  <ellipse cx="68" cy="51" rx="4.8" ry="4.2" fill="#2a3820"/>
  <ellipse cx="68" cy="51" rx="3" ry="3" fill="#0e1408"/>
  <ellipse cx="70" cy="49.5" rx="1.4" ry="1.2" fill="rgba(255,255,255,0.65)"/>
  <path d="M 60 47 Q 68 43 76 47" fill="none" stroke="#2a1808" stroke-width="2" stroke-linecap="round"/>
  <!-- Left eyebrow (dignified, slightly raised) -->
  <path d="M 59 42 Q 67 38 76 41" fill="none" stroke="#5a4830" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Right eye -->
  <ellipse cx="92" cy="50" rx="8.5" ry="5.5" fill="white"/>
  <ellipse cx="92" cy="51" rx="4.8" ry="4.2" fill="#2a3820"/>
  <ellipse cx="92" cy="51" rx="3" ry="3" fill="#0e1408"/>
  <ellipse cx="94" cy="49.5" rx="1.4" ry="1.2" fill="rgba(255,255,255,0.65)"/>
  <path d="M 84 47 Q 92 43 100 47" fill="none" stroke="#2a1808" stroke-width="2" stroke-linecap="round"/>
  <!-- Right eyebrow -->
  <path d="M 84 42 Q 92 38 101 41" fill="none" stroke="#5a4830" stroke-width="2.6" stroke-linecap="round"/>

  <!-- ── Nose (strong, patrician) ── -->
  <path d="M 78 55 Q 76 62 78 67 Q 80 69 82 67 Q 84 62 82 55" fill="none" stroke="rgba(160,90,60,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="77" cy="67" rx="2.5" ry="1.6" fill="rgba(160,90,60,0.14)"/>
  <ellipse cx="83" cy="67" rx="2.5" ry="1.6" fill="rgba(160,90,60,0.14)"/>

  <!-- ── Mustache ── -->
  <path d="M 70 72 Q 76 69 80 71 Q 84 69 90 72" fill="none" stroke="#786050" stroke-width="3" stroke-linecap="round"/>
  <!-- Short trim beard -->
  <path d="M 69 73 Q 73 80 80 81 Q 87 80 91 73" stroke="#685848" stroke-width="2.2" fill="rgba(100,80,60,0.28)" stroke-linecap="round"/>

  <!-- ── Mouth (firm, kind smile) ── -->
  <path d="M 73 73 Q 80 76 87 73" fill="none" stroke="#b87860" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ── Crown ── -->
  <!-- Crown base band -->
  <rect x="52" y="22" width="56" height="14" rx="3" fill="url(#roi-crown)"/>
  <!-- Crown points - left, center, right arches -->
  <path d="M 52 22 Q 59 9 66 22" fill="url(#roi-crown)" stroke="#9a7018" stroke-width="0.5"/>
  <path d="M 66 22 Q 80 6 94 22" fill="url(#roi-crown)" stroke="#9a7018" stroke-width="0.5"/>
  <path d="M 94 22 Q 101 9 108 22" fill="url(#roi-crown)" stroke="#9a7018" stroke-width="0.5"/>
  <!-- Fleur-de-lis center tip -->
  <ellipse cx="80" cy="8" rx="5" ry="3.5" fill="#f0d050"/>
  <rect x="78" y="4" width="4" height="10" rx="2" fill="#e0c040" opacity="0.8"/>
  <!-- Side tips -->
  <ellipse cx="64" cy="11" rx="3.5" ry="2.5" fill="#e8c838"/>
  <ellipse cx="96" cy="11" rx="3.5" ry="2.5" fill="#e8c838"/>
  <!-- Crown jewels -->
  <ellipse cx="80" cy="28" rx="4.5" ry="3.5" fill="#8a1c1c"/>
  <ellipse cx="80" cy="28" rx="2.5" ry="2" fill="#c03030" opacity="0.6"/>
  <ellipse cx="63" cy="28" rx="3.5" ry="2.8" fill="#1e3a80"/>
  <ellipse cx="97" cy="28" rx="3.5" ry="2.8" fill="#1e3a80"/>
  <!-- Crown highlight -->
  <rect x="52" y="22" width="56" height="5" rx="2" fill="rgba(255,225,100,0.22)"/>
  <!-- Crown base bottom line -->
  <rect x="52" y="33" width="56" height="3" rx="1.5" fill="#8a6010" opacity="0.4"/>
</svg>
