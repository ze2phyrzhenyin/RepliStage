<svg viewBox="0 0 160 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dress: dusty maid blue-gray -->
    <linearGradient id="tjf-dress" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#7a8fa8"/>
      <stop offset="100%" stop-color="#4a6278"/>
    </linearGradient>
    <!-- Apron: off-white linen -->
    <linearGradient id="tjf-apron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e0d0"/>
      <stop offset="100%" stop-color="#c8c0ae"/>
    </linearGradient>
    <!-- Skin: warm ivory -->
    <radialGradient id="tjf-skin" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#f5d8b8"/>
      <stop offset="100%" stop-color="#d8a878"/>
    </radialGradient>
    <!-- Hair: warm chestnut -->
    <radialGradient id="tjf-hair" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#8a5a2a"/>
      <stop offset="100%" stop-color="#4a2e10"/>
    </radialGradient>
    <!-- Mop handle -->
    <linearGradient id="tjf-mop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9a7848"/>
      <stop offset="100%" stop-color="#5e4828"/>
    </linearGradient>
  </defs>

  <!-- Floor shadow -->
  <ellipse cx="80" cy="298" rx="34" ry="4" fill="rgba(0,0,0,0.28)"/>

  <!-- ── Mop / broom handle (behind body, going diagonally) ── -->
  <!-- Handle shaft goes from bottom-left up to top-right of character -->
  <rect x="14" y="48" width="7" height="220" rx="3.5"
    fill="url(#tjf-mop)"
    transform="rotate(-12 80 180)"/>
  <!-- Mop head (top of handle) -->
  <ellipse cx="48" cy="58" rx="12" ry="8" fill="#c8c0a8" opacity="0.75" transform="rotate(-12 48 58)"/>
  <!-- Mop strands suggestion -->
  <line x1="38" y1="54" x2="34" y2="70" stroke="#b8b09a" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="42" y1="52" x2="38" y2="70" stroke="#b8b09a" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="46" y1="50" x2="43" y2="68" stroke="#b8b09a" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="50" y1="50" x2="48" y2="68" stroke="#b8b09a" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="54" y1="52" x2="54" y2="68" stroke="#b8b09a" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="58" y1="56" x2="60" y2="70" stroke="#b8b09a" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- ── Dress (full length, simple) ── -->
  <!-- Back layer of dress (slightly wider) -->
  <path d="M 44 148 Q 22 200 18 300 L 142 300 Q 138 200 116 148 Z" fill="#42586a"/>
  <!-- Main dress front -->
  <path d="M 48 148 Q 28 200 24 298 L 136 298 Q 132 200 112 148 Z" fill="url(#tjf-dress)"/>
  <!-- Dress fold shadows -->
  <path d="M 60 155 Q 50 200 46 298 L 54 298 Q 56 200 64 158 Z" fill="rgba(0,0,0,0.1)"/>
  <path d="M 100 155 Q 110 200 114 298 L 106 298 Q 104 200 96 158 Z" fill="rgba(0,0,0,0.1)"/>
  <!-- Subtle dress center highlight -->
  <path d="M 75 148 Q 70 200 72 298 L 88 298 Q 90 200 85 148 Z" fill="rgba(255,255,255,0.04)"/>
  <!-- Dress hem slight darker -->
  <path d="M 24 284 Q 80 278 136 284 L 136 298 Q 80 290 24 298 Z" fill="rgba(0,0,0,0.12)"/>

  <!-- ── Apron (over the dress) ── -->
  <path d="M 60 142 Q 48 185 50 260 L 110 260 Q 112 185 100 142 Z" fill="url(#tjf-apron)"/>
  <!-- Apron center fold -->
  <line x1="80" y1="142" x2="80" y2="260" stroke="rgba(180,170,155,0.3)" stroke-width="1"/>
  <!-- Apron waistband -->
  <rect x="56" y="140" width="48" height="8" rx="3" fill="#d0c8b6"/>
  <!-- Apron bow (behind at waist) -->
  <path d="M 52 144 Q 40 140 36 148 Q 40 155 52 150 Z" fill="#d8d0be"/>
  <path d="M 108 144 Q 120 140 124 148 Q 120 155 108 150 Z" fill="#d8d0be"/>

  <!-- ── Bodice ── -->
  <path d="M 46 106 L 44 148 L 116 148 L 114 106 Q 80 96 46 106 Z" fill="#5a7490"/>
  <!-- Bodice center seam -->
  <line x1="80" y1="98" x2="80" y2="148" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <!-- Bodice highlight -->
  <path d="M 62 106 Q 80 99 98 106 L 95 124 Q 80 117 65 124 Z" fill="rgba(255,255,255,0.06)"/>
  <!-- Simple round collar -->
  <ellipse cx="80" cy="103" rx="18" ry="7" fill="#9ab0c4"/>
  <ellipse cx="80" cy="104" rx="14" ry="5" fill="#5a7490"/>

  <!-- ── Left arm (holding mop handle loosely) ── -->
  <path d="M 46 106 Q 30 128 30 165 Q 32 170 40 168 Q 38 132 50 112 Z" fill="#7a9ab2"/>
  <!-- Left hand gripping handle -->
  <path d="M 30 165 Q 26 178 30 185 Q 38 187 40 178 Q 38 170 38 168 Z" fill="url(#tjf-skin)"/>

  <!-- ── Right arm (hanging, tired posture) ── -->
  <path d="M 114 106 Q 126 128 122 162 Q 120 168 112 166 Q 116 132 110 112 Z" fill="#7a9ab2"/>
  <!-- Right hand -->
  <path d="M 122 162 Q 124 175 118 180 Q 110 182 108 174 Q 112 165 114 162 Z" fill="url(#tjf-skin)"/>

  <!-- ── Neck ── -->
  <rect x="73" y="88" width="14" height="18" rx="5" fill="url(#tjf-skin)"/>

  <!-- ── Hair (back, tied) ── -->
  <!-- Low bun at back -->
  <ellipse cx="80" cy="60" rx="28" ry="24" fill="#3e2810"/>
  <!-- Bun itself, lower back of head -->
  <ellipse cx="80" cy="72" rx="16" ry="12" fill="#4a3018"/>
  <!-- Bun top portion -->
  <ellipse cx="80" cy="62" rx="12" ry="9" fill="#5a3820"/>

  <!-- ── Head ── -->
  <ellipse cx="80" cy="55" rx="24" ry="26" fill="url(#tjf-skin)"/>
  <!-- Jaw / young soft face -->
  <path d="M 58 65 Q 68 84 80 86 Q 92 84 102 65" fill="url(#tjf-skin)"/>
  <!-- Soft cheeks -->
  <ellipse cx="63" cy="67" rx="8" ry="5" fill="rgba(220,120,100,0.1)"/>
  <ellipse cx="97" cy="67" rx="8" ry="5" fill="rgba(220,120,100,0.1)"/>
  <!-- Rosy cheeks (natural, from work) -->
  <ellipse cx="65" cy="65" rx="6" ry="3.5" fill="rgba(230,130,110,0.14)"/>
  <ellipse cx="95" cy="65" rx="6" ry="3.5" fill="rgba(230,130,110,0.14)"/>

  <!-- ── Hair front (wisps and part) ── -->
  <!-- Left temple wisp -->
  <path d="M 58 42 Q 50 52 52 66 Q 56 72 62 66 Q 54 56 60 48 Z" fill="#5a3820"/>
  <!-- Right temple wisp -->
  <path d="M 102 42 Q 110 52 108 66 Q 104 72 98 66 Q 106 56 100 48 Z" fill="#5a3820"/>
  <!-- Top hair (pulled back, center part) -->
  <path d="M 58 42 Q 68 30 80 30 Q 92 30 102 42 Q 92 36 80 34 Q 68 36 58 42 Z" fill="url(#tjf-hair)"/>
  <!-- Hair texture lines -->
  <path d="M 66 34 Q 72 30 80 30" fill="none" stroke="#3a2010" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 80 30 Q 88 30 94 34" fill="none" stroke="#3a2010" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Small hair tie suggestion -->
  <ellipse cx="80" cy="72" rx="4" ry="2" fill="#6a4828" opacity="0.6"/>
  <ellipse cx="80" cy="72" rx="2" ry="1" fill="#3a2810" opacity="0.5"/>

  <!-- ── Eyes (clear, expressive, slightly tired) ── -->
  <!-- Left eye -->
  <ellipse cx="68" cy="51" rx="8" ry="5.5" fill="white"/>
  <ellipse cx="68" cy="52" rx="4.5" ry="4" fill="#4a6838"/>
  <ellipse cx="68" cy="52" rx="2.8" ry="2.8" fill="#181e10"/>
  <ellipse cx="70" cy="50.5" rx="1.3" ry="1.1" fill="rgba(255,255,255,0.7)"/>
  <!-- Upper lid line -->
  <path d="M 61 48 Q 68 44 75 48" fill="none" stroke="#2a1808" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left eyebrow (soft, slightly worried arch) -->
  <path d="M 60 44 Q 67 41 75 43" fill="none" stroke="#6a4020" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Under-eye subtle shadow (tiredness) -->
  <path d="M 62 55 Q 68 57 74 55" fill="none" stroke="rgba(160,100,80,0.2)" stroke-width="1"/>

  <!-- Right eye -->
  <ellipse cx="92" cy="51" rx="8" ry="5.5" fill="white"/>
  <ellipse cx="92" cy="52" rx="4.5" ry="4" fill="#4a6838"/>
  <ellipse cx="92" cy="52" rx="2.8" ry="2.8" fill="#181e10"/>
  <ellipse cx="94" cy="50.5" rx="1.3" ry="1.1" fill="rgba(255,255,255,0.7)"/>
  <path d="M 85 48 Q 92 44 99 48" fill="none" stroke="#2a1808" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M 85 44 Q 92 41 100 43" fill="none" stroke="#6a4020" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 86 55 Q 92 57 98 55" fill="none" stroke="rgba(160,100,80,0.2)" stroke-width="1"/>

  <!-- ── Nose (small, soft) ── -->
  <path d="M 79 56 Q 77 62 78 66 Q 80 68 82 66 Q 83 62 81 56" fill="none" stroke="rgba(160,90,60,0.2)" stroke-width="1.3" stroke-linecap="round"/>
  <ellipse cx="77.5" cy="66" rx="2" ry="1.4" fill="rgba(160,90,60,0.12)"/>
  <ellipse cx="82.5" cy="66" rx="2" ry="1.4" fill="rgba(160,90,60,0.12)"/>

  <!-- ── Mouth (soft, slightly pursed - polite but weary) ── -->
  <path d="M 72 72 Q 76 70 80 71 Q 84 70 88 72 Q 84 74 80 73 Q 76 74 72 72 Z" fill="#c87868"/>
  <path d="M 72 72 Q 80 76 88 72 Q 84 74 80 73 Q 76 74 72 72 Z" fill="#d88878"/>
  <path d="M 72 72 Q 80 70 88 72" fill="none" stroke="#b86858" stroke-width="0.9"/>
</svg>
