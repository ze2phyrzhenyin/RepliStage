<svg viewBox="0 0 160 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Skirt: rich wine/plum -->
    <radialGradient id="bm-skirt" cx="48%" cy="25%" r="72%">
      <stop offset="0%"   stop-color="#c45878"/>
      <stop offset="45%"  stop-color="#9a3858"/>
      <stop offset="100%" stop-color="#5e1f38"/>
    </radialGradient>
    <!-- Bodice -->
    <linearGradient id="bm-bodice" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7a2840"/>
      <stop offset="40%"  stop-color="#b04868"/>
      <stop offset="100%" stop-color="#7a2840"/>
    </linearGradient>
    <!-- Skin -->
    <radialGradient id="bm-skin" cx="50%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#f5d2b2"/>
      <stop offset="100%" stop-color="#d8aa88"/>
    </radialGradient>
    <!-- Hair -->
    <radialGradient id="bm-hair" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#7a3020"/>
      <stop offset="100%" stop-color="#2e0e08"/>
    </radialGradient>
    <!-- Neck/decollete skin -->
    <linearGradient id="bm-neck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ecc8a0"/>
      <stop offset="100%" stop-color="#d8aa84"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════════
       HAIR — back volume (drawn first, behind face)
       ══════════════════════════════════════ -->
  <!-- Wide hair silhouette behind head -->
  <ellipse cx="80" cy="58" rx="40" ry="44" fill="#2e1008"/>
  <!-- Main hair mass on top -->
  <ellipse cx="80" cy="26" rx="26" ry="22" fill="url(#bm-hair)"/>
  <!-- Left side curl sweep -->
  <path d="M44 52 Q34 68 38 92 Q44 98 50 88 Q42 72 48 56 Z" fill="#3a1810"/>
  <!-- Right side curl sweep -->
  <path d="M116 52 Q126 68 122 92 Q116 98 110 88 Q118 72 112 56 Z" fill="#3a1810"/>

  <!-- ══════════════════════════════════════
       SKIRT — wide, full, floor-length
       ══════════════════════════════════════ -->
  <!-- Main skirt shape -->
  <path d="M38 162 Q8 210 4 300 L156 300 Q152 210 122 162 Z" fill="url(#bm-skirt)"/>
  <!-- Center highlight panel -->
  <path d="M80 162 Q72 210 74 300 L86 300 Q88 210 80 162" fill="rgba(255,255,255,0.07)"/>
  <!-- Left deep fold -->
  <path d="M52 168 Q30 218 22 300 L40 300 Q36 218 58 172 Z" fill="rgba(0,0,0,0.16)"/>
  <!-- Right deep fold -->
  <path d="M108 168 Q130 218 138 300 L120 300 Q124 218 102 172 Z" fill="rgba(0,0,0,0.16)"/>
  <!-- Secondary folds -->
  <path d="M62 170 Q52 220 50 300 L58 300 Q56 220 66 172 Z" fill="rgba(0,0,0,0.07)"/>
  <path d="M98 170 Q108 220 110 300 L102 300 Q104 220 94 172 Z" fill="rgba(0,0,0,0.07)"/>
  <!-- Skirt bottom flounce/trim -->
  <path d="M4 282 Q80 270 156 282 L156 300 Q80 286 4 300 Z" fill="#6e2040"/>
  <!-- Second trim row -->
  <path d="M8 265 Q80 254 152 265 L153 276 Q80 262 7 276 Z" fill="rgba(180,80,110,0.35)"/>
  <!-- Trim lace detail dots -->
  <path d="M4 282 Q80 270 156 282" fill="none" stroke="rgba(255,220,200,0.18)" stroke-width="1.5" stroke-dasharray="4,5"/>

  <!-- ══════════════════════════════════════
       BODICE
       ══════════════════════════════════════ -->
  <path d="M40 118 L38 162 L122 162 L120 118 Q80 106 40 118 Z" fill="url(#bm-bodice)"/>
  <!-- Center seam boning detail -->
  <line x1="80" y1="106" x2="80" y2="162" stroke="rgba(0,0,0,0.18)" stroke-width="1.2"/>
  <!-- Waist cinching shadow -->
  <path d="M46 150 Q80 143 114 150 L116 162 Q80 155 44 162 Z" fill="rgba(0,0,0,0.2)"/>
  <!-- Bodice front highlight -->
  <path d="M58 118 Q80 110 102 118 L100 136 Q80 128 60 136 Z" fill="rgba(255,255,255,0.09)"/>
  <!-- Off-shoulder neckline edge -->
  <path d="M40 118 Q80 106 120 118" fill="none" stroke="#d8a8b0" stroke-width="2"/>
  <!-- Lace or trim on neckline -->
  <path d="M40 118 Q80 108 120 118" fill="none" stroke="rgba(255,240,225,0.25)" stroke-width="3.5" stroke-dasharray="3,4"/>

  <!-- ══════════════════════════════════════
       SHOULDERS / ARMS
       ══════════════════════════════════════ -->
  <!-- Left shoulder -->
  <ellipse cx="38" cy="118" rx="14" ry="7" fill="#e4b898"/>
  <!-- Right shoulder -->
  <ellipse cx="122" cy="118" rx="14" ry="7" fill="#d8aa88"/>

  <!-- Left arm — hanging with slight curve, imperious -->
  <path d="M38 118 Q22 140 26 178 Q28 182 36 180 Q34 144 44 122 Z" fill="#e0b090"/>
  <!-- Left gloved hand -->
  <path d="M26 178 Q22 196 30 204 Q38 206 40 196 Q36 186 36 180 Z" fill="#f2e4d4"/>
  <!-- Hand fingers hint -->
  <path d="M30 200 L28 206 M34 203 L32 210 M38 202 L37 208" stroke="#d8b898" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Right arm — slightly raised, gesture of authority -->
  <path d="M122 118 Q136 136 132 172 Q130 176 122 174 Q124 140 116 122 Z" fill="#d8aa88"/>
  <!-- Right gloved hand / fan suggestion -->
  <path d="M132 172 Q136 188 128 194 Q120 196 118 186 Q122 178 122 174 Z" fill="#f2e4d4"/>
  <!-- Fan in right hand -->
  <path d="M130 184 Q140 174 148 178 Q144 192 132 194 Z" fill="#c8a8b0" opacity="0.7"/>
  <path d="M130 184 L140 174" stroke="#9a7880" stroke-width="0.8"/>
  <path d="M131 186 L142 177" stroke="#9a7880" stroke-width="0.8"/>
  <path d="M132 189 L143 181" stroke="#9a7880" stroke-width="0.8"/>
  <path d="M133 192 L143 186" stroke="#9a7880" stroke-width="0.8"/>

  <!-- ══════════════════════════════════════
       NECK & DÉCOLLETÉ
       ══════════════════════════════════════ -->
  <rect x="71" y="96" width="18" height="24" rx="7" fill="url(#bm-neck)"/>
  <!-- Décolleté shadow -->
  <ellipse cx="80" cy="118" rx="22" ry="6" fill="rgba(60,10,20,0.14)"/>

  <!-- ══════════════════════════════════════
       FACE
       ══════════════════════════════════════ -->
  <ellipse cx="80" cy="74" rx="27" ry="30" fill="url(#bm-skin)"/>
  <!-- Jaw definition — slightly strong chin -->
  <path d="M55 82 Q68 102 80 103 Q92 102 105 82" fill="url(#bm-skin)"/>
  <!-- Cheek shadow (hollow, aristocratic) -->
  <ellipse cx="62" cy="80" rx="8" ry="5" fill="rgba(180,100,80,0.1)"/>
  <ellipse cx="98" cy="80" rx="8" ry="5" fill="rgba(180,100,80,0.1)"/>
  <!-- Blush (subtle) -->
  <ellipse cx="65" cy="78" rx="7" ry="4" fill="rgba(220,120,100,0.12)"/>
  <ellipse cx="95" cy="78" rx="7" ry="4" fill="rgba(220,120,100,0.12)"/>

  <!-- ══ Left eye ══ -->
  <ellipse cx="69" cy="70" rx="8" ry="5" fill="white"/>
  <!-- Iris -->
  <ellipse cx="69" cy="71" rx="4.5" ry="4" fill="#2a4820"/>
  <!-- Pupil -->
  <ellipse cx="69" cy="71" rx="2.8" ry="2.8" fill="#0e1808"/>
  <!-- Highlight -->
  <ellipse cx="71" cy="69.5" rx="1.2" ry="1.1" fill="rgba(255,255,255,0.75)"/>
  <!-- Upper lid line -->
  <path d="M61 68 Q69 64 77 68" fill="none" stroke="#3a1808" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Lower lid -->
  <path d="M62 72 Q69 74 76 72" fill="none" stroke="rgba(120,60,40,0.35)" stroke-width="0.8"/>
  <!-- Lashes — upper (arched haughtily) -->
  <path d="M62 67 L60 63" stroke="#2a1008" stroke-width="1" stroke-linecap="round"/>
  <path d="M65 65.5 L64 61" stroke="#2a1008" stroke-width="1" stroke-linecap="round"/>
  <path d="M69 64.5 L69 60" stroke="#2a1008" stroke-width="1" stroke-linecap="round"/>
  <path d="M73 65.5 L74 61" stroke="#2a1008" stroke-width="1" stroke-linecap="round"/>
  <path d="M76 67 L78 63.5" stroke="#2a1008" stroke-width="1" stroke-linecap="round"/>
  <!-- Eyebrow — arched high, imperious -->
  <path d="M60 61 Q68 55 77 59" fill="none" stroke="#4a2010" stroke-width="2.4" stroke-linecap="round"/>

  <!-- ══ Right eye ══ -->
  <ellipse cx="91" cy="70" rx="8" ry="5" fill="white"/>
  <ellipse cx="91" cy="71" rx="4.5" ry="4" fill="#2a4820"/>
  <ellipse cx="91" cy="71" rx="2.8" ry="2.8" fill="#0e1808"/>
  <ellipse cx="93" cy="69.5" rx="1.2" ry="1.1" fill="rgba(255,255,255,0.75)"/>
  <path d="M83 68 Q91 64 99 68" fill="none" stroke="#3a1808" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M84 72 Q91 74 98 72" fill="none" stroke="rgba(120,60,40,0.35)" stroke-width="0.8"/>
  <path d="M84 67 L82 63" stroke="#2a1008" stroke-width="1" stroke-linecap="round"/>
  <path d="M87 65.5 L86 61" stroke="#2a1008" stroke-width="1" stroke-linecap="round"/>
  <path d="M91 64.5 L91 60" stroke="#2a1008" stroke-width="1" stroke-linecap="round"/>
  <path d="M95 65.5 L96 61" stroke="#2a1008" stroke-width="1" stroke-linecap="round"/>
  <path d="M98 67 L100 63.5" stroke="#2a1008" stroke-width="1" stroke-linecap="round"/>
  <path d="M83 61 Q91 55 100 59" fill="none" stroke="#4a2010" stroke-width="2.4" stroke-linecap="round"/>

  <!-- ══ Nose ══ -->
  <!-- Aquiline, refined -->
  <path d="M78 74 Q76 80 77 84 Q80 87 83 84 Q84 80 82 74" fill="none" stroke="rgba(160,90,70,0.28)" stroke-width="1.4" stroke-linecap="round"/>
  <ellipse cx="76.5" cy="84" rx="2.2" ry="1.4" fill="rgba(160,90,70,0.15)"/>
  <ellipse cx="83.5" cy="84" rx="2.2" ry="1.4" fill="rgba(160,90,70,0.15)"/>

  <!-- ══ Mouth — pursed, slightly contemptuous ══ -->
  <!-- Upper lip -->
  <path d="M70 91 Q76 88 80 90 Q84 88 90 91 Q84 93 80 92 Q76 93 70 91 Z" fill="#c06880"/>
  <!-- Lower lip -->
  <path d="M70 91 Q80 96 90 91 Q84 93 80 92 Q76 93 70 91 Z" fill="#d07890"/>
  <!-- Lip line -->
  <path d="M70 91 Q80 89 90 91" fill="none" stroke="#a85068" stroke-width="1"/>
  <!-- Lip highlight -->
  <ellipse cx="80" cy="92" rx="5" ry="1.5" fill="rgba(255,210,200,0.3)"/>
  <!-- Subtle smirk at right corner -->
  <path d="M89 91 Q92 92 91 94" fill="none" stroke="#b06070" stroke-width="0.9" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════
       HAIR — FRONT LAYER (over face sides)
       ══════════════════════════════════════ -->
  <!-- Left temple / side hair -->
  <path d="M54 52 Q42 64 44 92 Q50 100 58 92 Q48 72 56 58 Z" fill="#4a1e10"/>
  <!-- Right temple -->
  <path d="M106 52 Q118 64 116 92 Q110 100 102 92 Q112 72 104 58 Z" fill="#4a1e10"/>

  <!-- Main upswept chignon / bun -->
  <!-- Base volume -->
  <ellipse cx="80" cy="26" rx="24" ry="18" fill="url(#bm-hair)"/>
  <!-- Left curl mass -->
  <ellipse cx="64" cy="22" rx="14" ry="10" fill="#5a2418"/>
  <!-- Right curl mass -->
  <ellipse cx="96" cy="22" rx="14" ry="10" fill="#5a2418"/>
  <!-- Top center peak -->
  <ellipse cx="80" cy="12" rx="12" ry="9" fill="#6a2e18"/>
  <!-- Curl detail left -->
  <path d="M58 20 Q62 12 70 16 Q66 24 58 20" fill="#3a1408"/>
  <path d="M56 28 Q58 18 66 22 Q62 30 56 28" fill="#3a1408"/>
  <!-- Curl detail right -->
  <path d="M102 20 Q98 12 90 16 Q94 24 102 20" fill="#3a1408"/>
  <path d="M104 28 Q102 18 94 22 Q98 30 104 28" fill="#3a1408"/>
  <!-- Hair texture lines -->
  <path d="M68 10 Q76 6 86 10" fill="none" stroke="#2a1008" stroke-width="1.2"/>
  <path d="M64 18 Q72 14 80 16" fill="none" stroke="#2a1008" stroke-width="1"/>
  <path d="M80 16 Q88 14 96 18" fill="none" stroke="#2a1008" stroke-width="1"/>

  <!-- ══ Hair ornament — gold comb with pearl ══ -->
  <!-- Comb tines -->
  <line x1="88" y1="10" x2="86" y2="22" stroke="#c8a030" stroke-width="1.2"/>
  <line x1="91" y1="9"  x2="89" y2="21" stroke="#c8a030" stroke-width="1.2"/>
  <line x1="94" y1="10" x2="92" y2="22" stroke="#c8a030" stroke-width="1.2"/>
  <!-- Comb spine -->
  <path d="M86 22 Q90 24 92 22 L94 10 Q90 8 86 10 Z" fill="#d4b040" opacity="0.6"/>
  <!-- Pearl on comb -->
  <circle cx="90" cy="8" r="4" fill="#f8f0e8" stroke="#d8c8a8" stroke-width="0.5"/>
  <ellipse cx="89" cy="7" rx="1.5" ry="1.2" fill="rgba(255,255,255,0.6)"/>

  <!-- ══════════════════════════════════════
       ACCESSORIES
       ══════════════════════════════════════ -->
  <!-- Pearl necklace -->
  <path d="M56 104 Q80 110 104 104" fill="none" stroke="rgba(200,180,150,0.3)" stroke-width="0.8"/>
  <!-- Pearls -->
  <circle cx="60"  cy="105" r="3"   fill="#f8f2ec" stroke="#ddd0c0" stroke-width="0.6"/>
  <circle cx="67"  cy="107" r="3"   fill="#f8f2ec" stroke="#ddd0c0" stroke-width="0.6"/>
  <circle cx="74"  cy="109" r="3.2" fill="#f8f2ec" stroke="#ddd0c0" stroke-width="0.6"/>
  <circle cx="80"  cy="110" r="3.2" fill="#f8f2ec" stroke="#ddd0c0" stroke-width="0.6"/>
  <circle cx="86"  cy="109" r="3.2" fill="#f8f2ec" stroke="#ddd0c0" stroke-width="0.6"/>
  <circle cx="93"  cy="107" r="3"   fill="#f8f2ec" stroke="#ddd0c0" stroke-width="0.6"/>
  <circle cx="100" cy="105" r="3"   fill="#f8f2ec" stroke="#ddd0c0" stroke-width="0.6"/>
  <!-- Pearl highlights -->
  <ellipse cx="79.5" cy="109" rx="1.2" ry="0.9" fill="rgba(255,255,255,0.55)"/>
  <ellipse cx="73.5" cy="108" rx="1.1" ry="0.8" fill="rgba(255,255,255,0.55)"/>
  <!-- Pendant drop -->
  <line x1="80" y1="113" x2="80" y2="119" stroke="#c8a840" stroke-width="1"/>
  <ellipse cx="80" cy="121" rx="4" ry="2.8" fill="#d4b860"/>
  <ellipse cx="80" cy="121" rx="2.5" ry="1.7" fill="#f0d880"/>
  <ellipse cx="79.5" cy="120.5" rx="0.9" ry="0.7" fill="rgba(255,255,200,0.6)"/>

  <!-- Left earring -->
  <circle cx="52" cy="72" r="3" fill="#d4b040" stroke="#b89020" stroke-width="0.5"/>
  <ellipse cx="52" cy="72" rx="1.5" ry="1.2" fill="rgba(255,230,100,0.5)"/>
  <line x1="52" y1="75" x2="52" y2="82" stroke="#c8a030" stroke-width="1.2"/>
  <ellipse cx="52" cy="84" rx="3.5" ry="2.5" fill="#f8f0e0" stroke="#d8c8a0" stroke-width="0.5"/>
  <ellipse cx="51.5" cy="83.5" rx="1.3" ry="1" fill="rgba(255,255,255,0.6)"/>

  <!-- Right earring -->
  <circle cx="108" cy="72" r="3" fill="#d4b040" stroke="#b89020" stroke-width="0.5"/>
  <ellipse cx="108" cy="72" rx="1.5" ry="1.2" fill="rgba(255,230,100,0.5)"/>
  <line x1="108" y1="75" x2="108" y2="82" stroke="#c8a030" stroke-width="1.2"/>
  <ellipse cx="108" cy="84" rx="3.5" ry="2.5" fill="#f8f0e0" stroke="#d8c8a0" stroke-width="0.5"/>
  <ellipse cx="107.5" cy="83.5" rx="1.3" ry="1" fill="rgba(255,255,255,0.6)"/>

  <!-- ══════════════════════════════════════
       FINAL DEPTH TOUCHES
       ══════════════════════════════════════ -->
  <!-- Subtle chin/neck shadow -->
  <ellipse cx="80" cy="100" rx="14" ry="4" fill="rgba(40,10,20,0.12)"/>
  <!-- Floor shadow ellipse -->
  <ellipse cx="80" cy="299" rx="38" ry="4" fill="rgba(0,0,0,0.28)"/>
</svg>
